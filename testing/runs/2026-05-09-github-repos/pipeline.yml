version: 1
name: github_repos
description: GitHub public repositories for the apache organization
source:
  type: http
  url: https://api.github.com/orgs/apache/repos
  method: GET
  params:
  - name: per_page
    type: integer
    value: 100
  - name: type
    type: string
    value: public
  schema:
    columns:
    - name: id
      path: id
      type: integer
    - name: name
      path: name
      type: string
    - name: full_name
      path: full_name
      type: string
    - name: description
      path: description
      type: string
    - name: html_url
      path: html_url
      type: string
    - name: language
      path: language
      type: string
    - name: stargazers_count
      path: stargazers_count
      type: integer
    - name: forks_count
      path: forks_count
      type: integer
    - name: created_at
      path: created_at
      type: timestamp
    - name: updated_at
      path: updated_at
      type: timestamp
    - name: owner_login
      path: owner.login
      type: string
cadence:
  strategy: incremental
  primary_key: id
