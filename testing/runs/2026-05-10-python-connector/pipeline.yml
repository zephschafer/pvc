version: 1
name: linear_issues
namespace: linear
description: All issues from the Linear issue tracker
source:
  type: python
  module: connectors.linear_issues
  function: fetch_issues
  params:
  - name: api_key
    type: string
    value: '{{ env.LINEAR_API_KEY }}'
  schema:
    columns:
    - name: id
      path: id
      type: string
    - name: title
      path: title
      type: string
    - name: state_name
      path: state_name
      type: string
    - name: priority
      path: priority
      type: integer
    - name: assignee_name
      path: assignee_name
      type: string
    - name: created_at
      path: created_at
      type: timestamp
    - name: updated_at
      path: updated_at
      type: timestamp
cadence:
  strategy: incremental
  primary_key: id
